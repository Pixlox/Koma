name: Koma CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: koma-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  quality:
    name: Quality and behavior
    runs-on: ubuntu-22.04
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux application dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            libgtk-3-dev \
            libssl-dev \
            patchelf

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.93.0
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2

      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm audit --audit-level=high
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run i18n:check
      - run: npm run test:run
      - run: npm run build
      - run: npm run test:e2e
      - run: cargo fmt --all -- --check
      - run: cargo clippy --workspace --all-targets --all-features -- -D warnings
      - run: cargo test --workspace

  desktop:
    name: Package ${{ matrix.name }}
    needs: quality
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux x64
            os: ubuntu-22.04
            bundles: appimage,deb
          - name: Windows x64
            os: windows-2025
            bundles: nsis,msi
          - name: macOS arm64
            os: macos-15
            bundles: app,dmg
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux application dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            libgtk-3-dev \
            libssl-dev \
            patchelf

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.93.0

      - uses: Swatinem/rust-cache@v2

      - run: npm ci
      - name: Build native bundles
        run: npm run tauri build -- --config src-tauri/tauri.ci.conf.json --ci --no-sign --bundles ${{ matrix.bundles }}

      - uses: actions/upload-artifact@v4
        with:
          name: koma-${{ matrix.name }}
          path: target/release/bundle/**
          if-no-files-found: error
          compression-level: 0
