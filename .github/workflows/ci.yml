name: Koma CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: koma-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  quality:
    name: Quality and behavior
    runs-on: ubuntu-22.04
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6

      - name: Install Linux application dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            libgtk-3-dev \
            libssl-dev \
            patchelf

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.93.0
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2

      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm audit --audit-level=high
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run i18n:check
      - run: npm run test:run
      - run: npm run build
      - run: npm run test:e2e
      - run: cargo fmt --all -- --check
      - run: cargo clippy --workspace --all-targets --all-features -- -D warnings
      - run: cargo test --workspace

  desktop:
    name: Package ${{ matrix.name }}
    needs: quality
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux x64
            os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            bundles: appimage,deb,rpm
          - name: Windows x64
            os: windows-2025
            target: x86_64-pc-windows-msvc
            bundles: nsis,msi
          - name: macOS arm64
            os: macos-15
            target: aarch64-apple-darwin
            bundles: app,dmg
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - name: Install Linux application dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            libgtk-3-dev \
            libssl-dev \
            patchelf \
            rpm

      - name: Configure Windows toolchain
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install WiX
        if: runner.os == 'Windows'
        shell: pwsh
        run: choco install wixtoolset --no-progress -y

      - name: Add WiX to PATH
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $wix = Get-ChildItem 'C:\Program Files (x86)','C:\Program Files' `
            -Directory -Filter 'WiX Toolset*' -ErrorAction SilentlyContinue |
            Where-Object { Test-Path (Join-Path $_.FullName 'bin\candle.exe') } |
            Sort-Object FullName -Descending |
            Select-Object -First 1
          if (-not $wix) { throw 'WiX toolset was not found after installation.' }
          Join-Path $wix.FullName 'bin' |
            Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.93.0
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2

      - run: npm ci
      - name: Build native bundles
        run: npm run tauri build -- --config src-tauri/tauri.ci.conf.json --ci --no-sign --target ${{ matrix.target }} --bundles ${{ matrix.bundles }}

      - uses: actions/upload-artifact@v4
        with:
          name: koma-${{ matrix.name }}
          path: target/${{ matrix.target }}/release/bundle/**
          if-no-files-found: error
          compression-level: 0
