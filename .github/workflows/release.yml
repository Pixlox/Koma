name: Koma release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: koma-release-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  build:
    name: Build ${{ matrix.name }}
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux x64
            os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            bundles: appimage,deb,rpm
          - name: Windows x64
            os: windows-2025
            target: x86_64-pc-windows-msvc
            bundles: nsis,msi
          - name: macOS Apple silicon
            os: macos-15
            target: aarch64-apple-darwin
            bundles: app,dmg
          - name: macOS Intel
            os: macos-15
            target: x86_64-apple-darwin
            bundles: app,dmg

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            libgtk-3-dev \
            libssl-dev \
            patchelf \
            rpm

      - name: Configure Windows toolchain
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install WiX
        if: runner.os == 'Windows'
        shell: pwsh
        run: choco install wixtoolset --no-progress -y

      - name: Add WiX to PATH
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $wix = Get-ChildItem 'C:\Program Files (x86)','C:\Program Files' `
            -Directory -Filter 'WiX Toolset*' -ErrorAction SilentlyContinue |
            Where-Object { Test-Path (Join-Path $_.FullName 'bin\candle.exe') } |
            Sort-Object FullName -Descending |
            Select-Object -First 1
          if (-not $wix) { throw 'WiX toolset was not found after installation.' }
          Join-Path $wix.FullName 'bin' |
            Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.93.0
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2

      - run: npm ci

      - name: Validate release metadata
        env:
          GITHUB_REF_NAME: ${{ github.ref_name }}
        run: npm run release:check

      - name: Prepare updater signing key
        shell: bash
        env:
          KOMA_UPDATER_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: |
          test -n "$KOMA_UPDATER_KEY"
          key_file="$RUNNER_TEMP/koma-updater.key"
          printf '%s' "$KOMA_UPDATER_KEY" > "$key_file"
          chmod 600 "$key_file"
          echo "TAURI_SIGNING_PRIVATE_KEY=$key_file" >> "$GITHUB_ENV"

      - name: Build and attach installers
        uses: tauri-apps/tauri-action@action-v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          KOMA_ANILIST_CLIENT_ID: ${{ secrets.KOMA_ANILIST_CLIENT_ID }}
          KOMA_MAL_CLIENT_ID: ${{ secrets.KOMA_MAL_CLIENT_ID }}
          KOMA_MAL_CLIENT_SECRET: ${{ secrets.KOMA_MAL_CLIENT_SECRET }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: .
          tagName: ${{ github.ref_name }}
          releaseName: "Koma ${{ github.ref_name }}"
          releaseBody: "Native installers and updater metadata are attached below."
          releaseDraft: true
          prerelease: false
          generateReleaseNotes: true
          retryAttempts: 2
          uploadUpdaterJson: true
          updaterJsonPreferNsis: true
          uploadUpdaterSignatures: true
          uploadWorkflowArtifacts: false
          args: --target ${{ matrix.target }} --bundles ${{ matrix.bundles }}
