name: Koma release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  desktop:
    name: ${{ matrix.name }}
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux x64
            os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
          - name: Windows x64
            os: windows-2025
            target: x86_64-pc-windows-msvc
          - name: macOS Apple silicon
            os: macos-15
            target: aarch64-apple-darwin
          - name: macOS Intel
            os: macos-15
            target: x86_64-apple-darwin
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            libgtk-3-dev \
            libssl-dev \
            patchelf

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.93.0
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2

      - run: npm ci
      - run: npm run release:check
        env:
          GITHUB_REF_NAME: ${{ github.ref_name }}

      - name: Prepare updater signing key
        shell: bash
        env:
          KOMA_UPDATER_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: |
          test -n "$KOMA_UPDATER_KEY"
          key_file="$RUNNER_TEMP/koma-updater.key"
          printf '%s' "$KOMA_UPDATER_KEY" > "$key_file"
          chmod 600 "$key_file"
          echo "TAURI_SIGNING_PRIVATE_KEY=$key_file" >> "$GITHUB_ENV"

      - name: Build draft release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          KOMA_DISCORD_CLIENT_ID: ${{ vars.KOMA_DISCORD_CLIENT_ID }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Koma ${{ github.ref_name }}"
          releaseDraft: true
          prerelease: false
          generateReleaseNotes: true
          uploadUpdaterJson: true
          updaterJsonPreferNsis: true
          args: --target ${{ matrix.target }}
