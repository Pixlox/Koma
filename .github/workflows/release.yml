name: Koma release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag, for example v0.1.0"
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: koma-release-${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  prepare:
    name: Prepare draft release
    runs-on: ubuntu-22.04
    outputs:
      release_id: ${{ steps.release.outputs.release_id }}
      release_tag: ${{ steps.release.outputs.release_tag }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Validate release metadata
        env:
          RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}
          GITHUB_REF_NAME: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}
        run: npm run release:check

      - name: Create or reuse draft
        id: release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}
        shell: bash
        run: |
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            is_draft="$(gh api "repos/$GITHUB_REPOSITORY/releases/tags/$RELEASE_TAG" --jq .draft)"
            if [ "$is_draft" != "true" ]; then
              echo "Release $RELEASE_TAG already exists and is not a draft." >&2
              exit 1
            fi
          else
            gh release create "$RELEASE_TAG" \
              --draft \
              --generate-notes \
              --target "$GITHUB_SHA" \
              --title "Koma $RELEASE_TAG"
          fi

          release_id="$(gh api "repos/$GITHUB_REPOSITORY/releases/tags/$RELEASE_TAG" --jq .id)"
          echo "release_id=$release_id" >> "$GITHUB_OUTPUT"
          echo "release_tag=$RELEASE_TAG" >> "$GITHUB_OUTPUT"

  desktop:
    name: Build ${{ matrix.name }}
    needs: prepare
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux x64
            os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            bundles: appimage,deb,rpm
          - name: Windows x64
            os: windows-2025
            target: x86_64-pc-windows-msvc
            bundles: nsis,msi
          - name: macOS Apple silicon
            os: macos-15
            target: aarch64-apple-darwin
            bundles: app,dmg
          - name: macOS Intel
            os: macos-15
            target: x86_64-apple-darwin
            bundles: app,dmg
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            libgtk-3-dev \
            libssl-dev \
            patchelf \
            rpm

      - name: Configure Windows toolchain
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install WiX
        if: runner.os == 'Windows'
        shell: pwsh
        run: choco install wixtoolset --no-progress -y

      - name: Add WiX to PATH
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $wix = Get-ChildItem 'C:\Program Files (x86)','C:\Program Files' `
            -Directory -Filter 'WiX Toolset*' -ErrorAction SilentlyContinue |
            Where-Object { Test-Path (Join-Path $_.FullName 'bin\candle.exe') } |
            Sort-Object FullName -Descending |
            Select-Object -First 1
          if (-not $wix) { throw 'WiX toolset was not found after installation.' }
          Join-Path $wix.FullName 'bin' |
            Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.93.0
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2

      - run: npm ci

      - name: Prepare updater signing key
        shell: bash
        env:
          KOMA_UPDATER_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: |
          test -n "$KOMA_UPDATER_KEY"
          key_file="$RUNNER_TEMP/koma-updater.key"
          printf '%s' "$KOMA_UPDATER_KEY" > "$key_file"
          chmod 600 "$key_file"
          echo "TAURI_SIGNING_PRIVATE_KEY=$key_file" >> "$GITHUB_ENV"

      - name: Build installers and updater assets
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          KOMA_ANILIST_CLIENT_ID: ${{ secrets.KOMA_ANILIST_CLIENT_ID }}
          KOMA_MAL_CLIENT_ID: ${{ secrets.KOMA_MAL_CLIENT_ID }}
          KOMA_MAL_CLIENT_SECRET: ${{ secrets.KOMA_MAL_CLIENT_SECRET }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: .
          releaseId: ${{ needs.prepare.outputs.release_id }}
          tagName: ${{ needs.prepare.outputs.release_tag }}
          releaseDraft: true
          prerelease: false
          retryAttempts: 2
          uploadUpdaterJson: true
          updaterJsonPreferNsis: true
          uploadUpdaterSignatures: true
          uploadWorkflowArtifacts: false
          args: --target ${{ matrix.target }} --bundles ${{ matrix.bundles }}

  verify:
    name: Verify release assets
    needs: [prepare, desktop]
    runs-on: ubuntu-22.04
    steps:
      - name: Check installers and updater manifest
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_ID: ${{ needs.prepare.outputs.release_id }}
          RELEASE_TAG: ${{ needs.prepare.outputs.release_tag }}
        shell: bash
        run: |
          set -euo pipefail

          assets="$(gh api \
            "repos/$GITHUB_REPOSITORY/releases/$RELEASE_ID/assets" \
            --paginate \
            --jq '.[].name')"

          require_asset() {
            local description="$1"
            local pattern="$2"
            if [[ ! "$assets" =~ $pattern ]]; then
              echo "Missing $description release asset." >&2
              echo "$assets" >&2
              exit 1
            fi
          }

          require_asset "Windows NSIS installer" '-setup\.exe$'
          require_asset "Windows MSI installer" '\.msi$'
          require_asset "macOS Apple silicon DMG" '_(aarch64|arm64)\.dmg$'
          require_asset "macOS Intel DMG" '_(x64|x86_64)\.dmg$'
          require_asset "Linux AppImage" '\.AppImage$'
          require_asset "Linux Debian package" '\.deb$'
          require_asset "Linux RPM package" '\.rpm$'
          require_asset "updater signatures" '\.sig$'
          require_asset "Tauri updater manifest" '^latest\.json$'

          mkdir -p "$RUNNER_TEMP/koma-release"
          gh release download "$RELEASE_TAG" \
            --pattern latest.json \
            --dir "$RUNNER_TEMP/koma-release" \
            --clobber

          manifest="$RUNNER_TEMP/koma-release/latest.json"
          version="${RELEASE_TAG#v}"

          jq -e --arg version "$version" '.version == $version' "$manifest"
          jq -e '
            .platforms
            | has("darwin-aarch64")
              and has("darwin-x86_64")
              and has("linux-x86_64")
              and has("windows-x86_64")
          ' "$manifest"
          jq -e --arg tag "$RELEASE_TAG" '
            all(
              .platforms[];
              (.signature | type == "string" and length > 0)
              and
              (.url
                | type == "string"
                  and contains("/releases/download/" + $tag + "/"))
            )
          ' "$manifest"

          echo "Verified Koma $RELEASE_TAG release assets:"
          echo "$assets"
